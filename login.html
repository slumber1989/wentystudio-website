<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Wenty Studio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 120px auto;
            padding: 48px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-title {
            text-align: center;
            margin-bottom: 32px;
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--warm-brown);
            box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.1);
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--warm-brown);
            color: var(--white);
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--dark-brown);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(204, 120, 92, 0.3);
        }
        .btn-secondary {
            background: var(--light-gray);
            color: var(--text-primary);
        }
        .btn-secondary:hover:not(:disabled) {
            background: var(--border-color);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: var(--warm-brown);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Wenty Studio</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <h2 class="login-title">登录</h2>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="code">验证码</label>
                <input type="text" id="code" placeholder="6位数字验证码" maxlength="6" pattern="[0-9]{6}">
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-secondary" id="sendCodeBtn">发送验证码</button>
                <button type="submit" class="btn btn-primary">登录</button>
            </div>
        </form>

        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>

    <script>
        const AUTH_API = 'https://auth.wentystudio.com';  // 生产环境
        // const AUTH_API = 'http://localhost:8002';  // 本地测试时取消注释

        let countdown = 0;

        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function startCountdown() {
            countdown = 60;
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;

            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重试`;

                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
        }

        document.getElementById('sendCodeBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();

            if (!email || !email.includes('@')) {
                showMessage('请输入有效的邮箱地址', 'error');
                return;
            }

            try {
                const response = await fetch(`${AUTH_API}/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('验证码已发送，请查收邮件', 'success');
                    startCountdown();
                } else {
                    showMessage(data.detail || '发送失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const code = document.getElementById('code').value.trim();

            if (!email || !code) {
                showMessage('请输入邮箱和验证码', 'error');
                return;
            }

            try {
                const response = await fetch(`${AUTH_API}/verify-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',  // 重要：携带 Cookie
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('登录成功，正在跳转...', 'success');

                    // 检查是否有跳转地址
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');

                    setTimeout(() => {
                        if (redirect) {
                            window.location.href = redirect;
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.detail || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            }
        });
    </script>
</body>
</html>
